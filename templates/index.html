<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>米家控制面板</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1c1f2e;
    --card-hover: #232638;
    --border: #2a2d3e;
    --accent: #ff6900;
    --text: #e8eaf0;
    --text-dim: #8b90a8;
    --green: #00c896;
    --red: #ff4f6e;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    min-height: 100vh;
    padding: 24px 20px 40px;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.02em; }
  header h1 span { color: var(--accent); }
  .refresh-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 7px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .refresh-btn:hover { background: var(--card-hover); color: var(--text); }
  .refresh-btn:active { transform: scale(0.97); }
  .refresh-btn .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .refresh-btn.loading .spinner {
    opacity: 1;
    animation: spinner-rotate 0.8s linear infinite;
  }
  .refresh-btn.loading .btn-text {
    opacity: 0.7;
  }
  @keyframes spinner-rotate { to { transform: rotate(360deg); } }

  /* ── Air quality bar ── */
  #air-bar {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 6px 0;
    min-height: 52px;
  }
  #air-bar.loading { animation: shimmer 1.2s infinite; }
  .air-metric {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px;
    border-right: 1px solid var(--border);
    gap: 2px;
  }
  .air-metric:last-child { border-right: none; }
  .air-metric-label {
    font-size: 0.68rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .air-metric-value {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .air-metric-unit { font-size: 0.65rem; color: var(--text-dim); }
  .air-offline { color: var(--text-dim); font-size: 0.85rem; }

  /* CO2 color coding */
  .co2-good    { color: var(--green); }
  .co2-ok      { color: #f0c040; }
  .co2-poor    { color: var(--red); }

  /* ── Device grid ── */
  .section-title {
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin: 28px 0 12px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: background 0.15s, border-color 0.15s;
  }
  .card:hover { background: var(--card-hover); }
  .card.on { border-color: rgba(255, 105, 0, 0.35); }
  .card-top { display: flex; align-items: center; gap: 10px; }
  .icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.05);
    transition: background 0.15s;
  }
  .card.on .icon { background: rgba(255, 105, 0, 0.15); }
  .card-name { font-size: 0.9rem; font-weight: 600; line-height: 1.3; }
  .card-meta { font-size: 0.72rem; color: var(--text-dim); margin-top: 1px; }

  .card-body { display: flex; flex-direction: column; gap: 6px; }
  .status-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 26px;
  }
  .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
    margin-right: 6px;
  }
  .dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.offline { background: var(--red); }
  .status-label { font-size: 0.78rem; color: var(--text-dim); display: flex; align-items: center; }

  .toggle { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; cursor: pointer; inset: 0;
    background: #333; border-radius: 24px; transition: background 0.2s;
  }
  .slider::before {
    content: ''; position: absolute;
    width: 18px; height: 18px; border-radius: 50%;
    background: #fff; left: 3px; top: 3px; transition: transform 0.2s;
  }
  input:checked + .slider { background: var(--accent); }
  input:checked + .slider::before { transform: translateX(20px); }
  .toggle.loading .slider { opacity: 0.5; cursor: wait; }
  
  .card-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mini-refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 26px;
    height: 26px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 12px;
  }
  .mini-refresh-btn:hover { 
    background: var(--card-hover); 
    color: var(--text);
    border-color: var(--text-dim);
  }
  .mini-refresh-btn.loading {
    pointer-events: none;
  }
  .mini-refresh-btn.loading .refresh-icon {
    animation: spinner-rotate 0.8s linear infinite;
  }

  .loading-skeleton {
    height: 8px; border-radius: 4px;
    background: linear-gradient(90deg, var(--border) 25%, var(--card-hover) 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  .countdown { font-size: 0.72rem; color: var(--text-dim); text-align: right; margin-top: 20px; }
  
  .sub-switches { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
  .sub-switch-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    gap: 8px;
  }
  .sub-switch-name { font-size: 0.82rem; color: var(--text); flex: 1; }
  .sub-switch-row .status-label { font-size: 0.72rem; }
  .sub-switch-row .dot { width: 5px; height: 5px; }
  .toggle-small { width: 36px; height: 20px; }
  .toggle-small .slider::before { width: 14px; height: 14px; left: 3px; top: 3px; }
  .toggle-small input:checked + .slider::before { transform: translateX(16px); }

</style>
</head>
<body>

<header>
  <h1>米家 <span>控制面板</span></h1>
  <div style="display: flex; gap: 10px;">
    <a href="/manage" style="color: #007aff; text-decoration: none; padding: 8px 16px; background: white; border-radius: 8px; font-size: 14px;">设备管理</a>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">
      <div class="spinner"></div>
      <span class="btn-text">刷新</span>
    </button>
  </div>
</header>

<div id="air-bar"><span class="air-offline">空气检测仪加载中…</span></div>
<div id="app"></div>
<div class="countdown" id="countdown"></div>

<script>
const DEVICES = {{ devices | tojson }};

const TYPE_ICONS = {
  light: '💡', airconditioner: '❄️', humidifier: '💧',
  plug: '🔌', sensor: '📊', speaker: '🔊', appliance: '🏠',
  mesh_switch: '⚡', mesh_switch_group: '🔌',
};
const TYPE_LABELS = {
  light: '灯光', airconditioner: '空调', humidifier: '加湿器',
  plug: '插座', sensor: '传感器', speaker: '音响', appliance: '家电',
  mesh_switch: '智能开关', mesh_switch_group: '智能开关',
};
const SECTIONS = [
  { label: '灯光',       types: ['light'] },
  { label: '气候',       types: ['airconditioner', 'humidifier'] },
  { label: '开关 / 插座 / 音响', types: ['mesh_switch', 'mesh_switch_group', 'plug', 'speaker'] },
  { label: '传感器',     types: ['sensor'] },
  { label: '家电',       types: ['appliance'] },
];

const state = {};
DEVICES.forEach(d => {
  if (d.type === 'mesh_switch_group' && d.sub_switches) {
    state[d.id] = { online: null, loading: true, sub_switches: {} };
    d.sub_switches.forEach(sub => {
      state[d.id].sub_switches[sub.id] = { online: null, power: null, toggling: false };
    });
  } else {
    state[d.id] = { online: null, power: null, loading: true, toggling: false, readings: null };
  }
});

// ── Air bar ──────────────────────────────────────────────
function co2Class(v) {
  if (v == null) return '';
  if (v < 800)  return 'co2-good';
  if (v < 1200) return 'co2-ok';
  return 'co2-poor';
}

function updateAirBar() {
  const bar = document.getElementById('air-bar');
  const s = state['sensor_air'];
  if (!s || s.loading) {
    bar.innerHTML = '<span class="air-offline">空气检测仪加载中…</span>';
    return;
  }
  if (!s.online) {
    bar.innerHTML = '<span class="air-offline">空气检测仪离线</span>';
    return;
  }
  const r = s.readings || {};
  const metrics = [
    { label: 'CO₂',  value: r.co2,         unit: 'ppm',  cls: co2Class(r.co2) },
    { label: '温度',  value: r.temperature, unit: '°C',   cls: '' },
    { label: '湿度',  value: r.humidity,    unit: '%',    cls: '' },
    { label: 'PM2.5',value: r.pm25,         unit: 'μg/m³',cls: '' },
    { label: 'TVOC', value: r.tvoc,         unit: 'ppb',  cls: '' },
  ];
  bar.innerHTML = metrics.map(m =>
    `<div class="air-metric">
      <span class="air-metric-label">${m.label}</span>
      <span class="air-metric-value ${m.cls}">${m.value ?? '—'}</span>
      <span class="air-metric-unit">${m.unit}</span>
    </div>`
  ).join('');
}

// ── Card rendering ────────────────────────────────────────
function renderCardBody(d, s) {
  if (d.type === 'mesh_switch_group') {
    return renderMeshGroupCardBody(d, s);
  }
  if (s.loading) {
    return `<div class="card-body"><div class="status-row"><div class="loading-skeleton" style="width:80px"></div></div></div>`;
  }
  const dotCls = s.online ? 'dot online' : 'dot offline';
  const statusText = s.online ? (s.power === true ? '开启' : s.power === false ? '关闭' : '在线') : '离线';
  const refreshBtn = d.controllable ? 
    `<button class="mini-refresh-btn" onclick="refreshDevice('${d.id}', this)" title="刷新状态">
      <span class="refresh-icon">↻</span>
    </button>` : '';
  let row;
  if (d.controllable && s.online) {
    const checked = s.power === true ? 'checked' : '';
    const loadingCls = s.toggling ? ' loading' : '';
    row = `<div class="status-row">
      <span class="status-label"><span class="${dotCls}"></span>${statusText}</span>
      <div class="card-actions">
        ${refreshBtn}
        <label class="toggle${loadingCls}">
          <input type="checkbox" ${checked} onchange="toggle('${d.id}', this.checked)" ${s.toggling ? 'disabled' : ''}>
          <span class="slider"></span>
        </label>
      </div>
    </div>`;
  } else {
    row = `<div class="status-row">
      <span class="status-label"><span class="${dotCls}"></span>${statusText}</span>
      ${refreshBtn}
    </div>`;
  }
  return `<div class="card-body">${row}</div>`;
}

function renderMeshGroupCardBody(d, s) {
  if (s.loading) {
    return `<div class="card-body"><div class="status-row"><div class="loading-skeleton" style="width:80px"></div></div></div>`;
  }
  
  const dotCls = s.online ? 'dot online' : 'dot offline';
  const mainStatusText = s.online ? '在线' : '离线';
  
  let subSwitchesHtml = '';
  if (d.sub_switches && s.sub_switches) {
    subSwitchesHtml = d.sub_switches.map(sub => {
      const subState = s.sub_switches[sub.id] || { online: false, power: null, toggling: false };
      const subDotCls = subState.online ? 'dot online' : 'dot offline';
      const subStatusText = subState.online ? (subState.power === true ? '开' : subState.power === false ? '关' : '—') : '离线';
      const checked = subState.power === true ? 'checked' : '';
      const loadingCls = subState.toggling ? ' loading' : '';
      const disabled = !subState.online || subState.toggling ? 'disabled' : '';
      
      return `<div class="sub-switch-row">
        <span class="sub-switch-name">${sub.name}</span>
        <span class="status-label"><span class="${subDotCls}"></span>${subStatusText}</span>
        <label class="toggle toggle-small${loadingCls}">
          <input type="checkbox" ${checked} onchange="toggleSubSwitch('${d.id}', '${sub.id}', this.checked)" ${disabled}>
          <span class="slider"></span>
        </label>
      </div>`;
    }).join('');
  }
  
  return `<div class="card-body">
    <div class="status-row">
      <span class="status-label"><span class="${dotCls}"></span>${mainStatusText}</span>
      <button class="mini-refresh-btn" onclick="refreshMeshGroup('${d.id}', this)" title="刷新状态">
        <span class="refresh-icon">↻</span>
      </button>
    </div>
    <div class="sub-switches">${subSwitchesHtml}</div>
  </div>`;
}

function updateCard(id) {
  const d = DEVICES.find(x => x.id === id);
  const cardEl = document.getElementById(`card_${id}`);
  if (!d || !cardEl) return;
  const s = state[id];
  cardEl.className = 'card' + (s.power === true ? ' on' : '');
  const oldBody = cardEl.querySelector('.card-body');
  if (oldBody) {
    const tmp = document.createElement('div');
    tmp.innerHTML = renderCardBody(d, s);
    oldBody.replaceWith(tmp.firstElementChild);
  }
  if (id === 'sensor_air') updateAirBar();
}

function renderAll() {
  const app = document.getElementById('app');
  let html = '';
  for (const section of SECTIONS) {
    const devs = DEVICES.filter(d => section.types.includes(d.type));
    if (!devs.length) continue;
    html += `<div class="section-title">${section.label}</div><div class="grid">`;
    for (const d of devs) {
      const s = state[d.id];
      const icon = TYPE_ICONS[d.type] || '📦';
      const label = TYPE_LABELS[d.type] || d.type;
      const readOnly = !d.controllable ? '只读' : '可控';
      html += `<div class="card${s.power === true ? ' on' : ''}" id="card_${d.id}">
        <div class="card-top">
          <div class="icon">${icon}</div>
          <div>
            <div class="card-name">${d.name}</div>
            <div class="card-meta">${label} · ${readOnly}</div>
          </div>
        </div>
        ${renderCardBody(d, s)}
      </div>`;
    }
    html += '</div>';
  }
  app.innerHTML = html;
}

// ── Data fetching ─────────────────────────────────────────
async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  try {
    const r = await fetch('/api/status/all');
    const all = await r.json();
    for (const [id, s] of Object.entries(all)) {
      const old = state[id];
      if (!old) continue;
      
      if (s.sub_switches) {
        const changed = old.loading || old.online !== s.online;
        state[id] = { online: s.online, loading: false, sub_switches: s.sub_switches };
        if (changed) updateCard(id);
      } else {
        const changed = old.loading
          || old.online !== s.online
          || old.power !== s.power
          || JSON.stringify(old.readings) !== JSON.stringify(s.readings || null);
        state[id] = { online: s.online, power: s.power, loading: false,
                      toggling: old.toggling || false, readings: s.readings || null };
        if (changed) updateCard(id);
      }
    }
  } catch (e) {
    DEVICES.forEach(d => {
      if (state[d.id] && state[d.id].loading) {
        if (d.type === 'mesh_switch_group') {
          state[d.id] = { online: false, loading: false, sub_switches: {} };
        } else {
          state[d.id] = { online: false, power: null, loading: false, toggling: false, readings: null };
        }
        updateCard(d.id);
      }
    });
  }
  btn.classList.remove('loading');
}

async function toggle(id, on) {
  state[id].toggling = true;
  state[id].power = on;
  updateCard(id);
  
  try {
    const r = await fetch(`/api/control/${id}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ power: on }),
    });
    const j = await r.json();
    if (!j.ok) {
      state[id].power = !on;
    }
  } catch (e) {
    state[id].power = !on;
  }
  state[id].toggling = false;
  updateCard(id);
}

async function refreshDevice(id, btnEl) {
  if (btnEl) btnEl.classList.add('loading');
  try {
    const r = await fetch(`/api/status/${id}`);
    const s = await r.json();
    const old = state[id];
    state[id] = { 
      online: s.online, 
      power: s.power, 
      loading: false,
      toggling: old.toggling || false, 
      readings: s.readings || null 
    };
    updateCard(id);
  } catch (e) {
  }
  if (btnEl) btnEl.classList.remove('loading');
}

async function toggleSubSwitch(groupId, subId, on) {
  const groupState = state[groupId];
  if (!groupState || !groupState.sub_switches || !groupState.sub_switches[subId]) return;
  
  groupState.sub_switches[subId].toggling = true;
  groupState.sub_switches[subId].power = on;
  updateCard(groupId);
  
  try {
    const r = await fetch(`/api/control/${subId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ power: on }),
    });
    const j = await r.json();
    if (!j.ok) {
      groupState.sub_switches[subId].power = !on;
    }
  } catch (e) {
    groupState.sub_switches[subId].power = !on;
  }
  groupState.sub_switches[subId].toggling = false;
  updateCard(groupId);
}

async function refreshMeshGroup(groupId, btnEl) {
  if (btnEl) btnEl.classList.add('loading');
  try {
    const r = await fetch(`/api/mesh/status/${groupId}`);
    const s = await r.json();
    const old = state[groupId];
    state[groupId] = { 
      online: s.online, 
      loading: false, 
      sub_switches: s.sub_switches || {} 
    };
    updateCard(groupId);
  } catch (e) {
  }
  if (btnEl) btnEl.classList.remove('loading');
}

// ── Auto-refresh ──────────────────────────────────────────
let countdown = 30;
function tick() {
  countdown--;
  document.getElementById('countdown').textContent = `${countdown} 秒后自动刷新`;
  if (countdown <= 0) { countdown = 30; refreshAll(); }
}

renderAll();
refreshAll();
setInterval(tick, 1000);
</script>
</body>
</html>
